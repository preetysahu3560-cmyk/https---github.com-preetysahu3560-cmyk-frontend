<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Inputs</title>
</head>
<body>
   <h3>Novell Services Login</h3> 
   <form action="#"></form>
   <label for="username">Username:</label>
<input type="text" name="username" id="fullname">
<br><br>

   <label for="password">Password:</label>
<input type="password" name="password" id="password">
<br><br>

   <label for="COE">City of Employement:</label>
<input type="COE" name="CEO" id="COE">
<br><br>

<label for="web server">Web Server</label>
<select name="web server" id="web server">
    <option value="">--Choose a Server</option>
<option value="Apache">Apache</option>
<option value="Nginx">Nginx</option>
</select>
<br><br>

<label for="place"> Place specify your role:</label>
<ol>

<input type="radio" name="role"  id="Admin"  value="Admin"><label for="Admin">Admin</label>
<br><br>

<input type="radio" name="role"  id="Engineer" value="engineer"><label for="Engineer">Engineer</label>
<br><br>

<input type="radio" name="role"  id="Manager"  value="manager"><label for="Manager">Manager</label>
<br><br>

<input type="radio" name="role"  id="Guest"  value="guest"><label for="Guest">Manager</label>
<br><br>

</ol>
<label for="sign-on"> Single sign-on
        to the following:</label>
<ol>
    
<input type="radio" name="sign-on"  id="Mail"  value="Mail"><label for="Mail">Mail</label>
<br><br>

<input type="radio" name="sign-on"  id="Payroll" value="Payroll"><label for="Payroll">Payroll</label>
<br><br>

<input type="radio" name="sign-on"  id="Self-Service"  value="Self-Service"><label for="service">Self-Service</label>
<br><br>

</ol>

<br><br>
<button>Login</button>  <button>reset</button>


</body>
</html>
